<div style="padding: 20px; border: 1px solid #ccc; margin-bottom: 20px; border-radius: 8px; font-family: sans-serif;">
  <h3>Cargar Nueva Pieza</h3>

  <form (ngSubmit)="guardar()">

    <div style="margin-bottom: 10px;">
      <label>Nombre de la Pieza:</label><br>
      <input type="text" name="nombre" [(ngModel)]="nuevoComponente.piece_name" required>
    </div>

    <div style="margin-bottom: 10px;">
      <label>Marca:</label><br>
      <select name="marca" [(ngModel)]="nuevoComponente.marca">
        <option value="ASUS">ASUS</option>
        <option value="AMD">AMD</option>
        <option value="NVIDIA">NVIDIA</option>
      </select>
    </div>

    <div style="margin-bottom: 10px;">
      <label>Precio ($):</label><br>
      <input type="number" name="precio" [(ngModel)]="nuevoComponente.price" required>
    </div>

    <button type="submit" style="padding: 8px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Guardar Componente
    </button>
  </form>

  @if (mensaje) {
    <p style="color: green; font-weight: bold;">{{ mensaje }}</p>
  }
</div>
