<div style="padding: 20px; font-family: sans-serif;">
  <h2>Inventario de componentes</h2>
  <table border="1" style="width: 100%; text-align: left; border-collapse: collapse;">
    <thead style="background-color: #f2f2f2;">
      <tr>
        <th>ID</th>
        <th>Pieza</th>
        <th>Marca</th>
        <th>Precio</th>
        <th>Eliminar</th>
      </tr>
    </thead>
    <tbody>
      @for (comp of componentes; track comp.id){
        <tr>
          <td>{{comp.id}}</td>
          <td>{{comp.piece_name}}</td>
          <td>{{comp.marca}}</td>
          <td>{{comp.price}}</td>
          <td style="text-align: center">
            <button (click)="delete(comp.id)" style="padding: 5px 10px; background-color: #007bff; color: #cccccc">
              Eliminar
            </button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" style="text-align: center;">No hay componentes disponilbes</td>
        </tr>
      }
    </tbody>
  </table>
</div>
